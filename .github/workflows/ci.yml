name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/app_db
  SPRING_DATASOURCE_USERNAME: abdy
  SPRING_DATASOURCE_PASSWORD: abdy2005

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: abdy
          POSTGRES_PASSWORD: abdy2005
          POSTGRES_DB: app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Run tests
        run: ./mvnw test

      - name: OWASP Dependency Check
        run: ./mvnw org.owasp:dependency-check-maven:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: keycloak-demo-app:ci

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: keycloak-demo-app:ci
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Generate SSL certs
        run: ./scripts/generate-certs.sh

      - name: Start full stack
        run: |
          cp .env.example .env
          docker compose up -d --build
          for i in $(seq 1 30); do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18090/api/public/health 2>/dev/null || echo "000")
            KEYCLOAK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18082/realms/Taks/.well-known/openid-configuration 2>/dev/null || echo "000")
            if [ "$HEALTH" = "200" ] && [ "$KEYCLOAK" = "200" ]; then
              echo "Both services ready after ${i}s"
              break
            fi
            sleep 3
          done

      - name: Newman API tests
        run: |
          docker run --rm --network=host \
            -v ${{ github.workspace }}/tests:/etc/newman \
            postman/newman:alpine \
            run /etc/newman/task-api-collection.json \
            --reporters cli,junit \
            --reporter-junit-export /etc/newman/results.xml

      - name: Publish Newman results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Newman Tests
          path: tests/results.xml
          reporter: java-junit

      - name: Cleanup
        if: always()
        run: docker compose down
