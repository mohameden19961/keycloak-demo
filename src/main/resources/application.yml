server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/app_db}
    username: ${SPRING_DATASOURCE_USERNAME:abdy}
    password: ${SPRING_DATASOURCE_PASSWORD:abdy2005}
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:18082/realms/Taks/protocol/openid-connect/certs}

keycloak:
  admin:
    server-url: ${KEYCLOAK_INTERNAL_URL:http://keycloak:8080}
    username: ${KEYCLOAK_ADMIN}
    password: ${KEYCLOAK_ADMIN_PASSWORD}
    realm: Taks
