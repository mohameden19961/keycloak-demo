version: "3.8"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    ports:
      - "15432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: https://localhost:18443
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HTTPS_PORT: 18443
    volumes:
      - ./realm-config:/opt/keycloak/data/import:ro
    depends_on:
      - postgres
    ports:
      - "18082:8080"

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/app_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # L'application contacte Keycloak en interne pour valider l'Issuer
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/Taks/protocol/openid-connect/certs
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
    depends_on:
      - postgres
      - keycloak
    ports:
      - "18090:8080"

  nginx:
    image: nginx:alpine
    volumes:
      - ./certs:/etc/nginx/certs
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "18088:80"
      - "18443:443"
    depends_on:
      - app
      - keycloak

volumes:
  pgdata: